services:
  - type: web
    name: astroagent-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python ingest.py"
    startCommand: "cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/astroagent.db
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_db
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: astroagent-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: astroagent-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://astroagent-backend.onrender.com
